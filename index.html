<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Henrique Santo | Em manutenção</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .logo {
      margin-bottom: 30px;
    }

    .logo img {
      max-width: 600px;
      height: auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      font-size: 16px;
    }

    /* animação leve */
    .fade {
      animation: fadeIn 1.2s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <div class="container fade">

    <div class="logo">
      <img src="img/logo.png" alt="Henrique Santo">
    </div>

    <h1>Em manutenção</h1>
    <p>Estamos preparando algo especial para você.</p>

  </div>

</body>
</html>
